name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - stage
          - prod

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          ENV: ${{ github.event.inputs.environment || 'qa' }}
          BASE_URL: ${{ secrets.BASE_URL }}
          VALID_EMAIL_ADDRESS: ${{ secrets.VALID_EMAIL_ADDRESS }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
          VALID_NAME: ${{ secrets.VALID_NAME }}
        run: npm run test:${{ github.event.inputs.environment || 'qa' }}

      # Step 1 — Install Java (required by Allure CLI)
      - name: Setup Java
        uses: actions/setup-java@v4
        if: always()
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 2 — Install Allure CLI
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      # Step 3 — Generate Allure HTML report from raw results
      - name: Generate Allure HTML Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # Step 4 — Upload raw results as artifact
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      # Step 5 — Upload generated HTML report as artifact
      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      # Step 6 — Deploy to GitHub Pages (viewable in browser)
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages